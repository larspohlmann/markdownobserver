name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run macOS tests
        run: |
          xcodebuild test \
            -project minimark.xcodeproj \
            -scheme minimark \
            -destination 'platform=macOS' \
            -only-testing:minimarkTests