name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - develop

jobs:
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          uname -a
          uname -m
          sw_vers

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available schemes
        run: xcodebuild -list -project minimark.xcodeproj

      - name: Resolve package dependencies
        run: |
          set -o pipefail
          xcodebuild -resolvePackageDependencies \
            -project minimark.xcodeproj \
            -scheme minimark \
            | tee resolve-packages.log

      - name: Build for testing
        run: |
          set -o pipefail
          build_for_testing() {
            xcodebuild build-for-testing \
              -project minimark.xcodeproj \
              -scheme minimark \
              -destination 'platform=macOS' \
              -resultBundlePath BuildForTestingResults.xcresult \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=''
          }

          build_for_testing | tee build-for-testing.log || {
            echo "First build-for-testing attempt failed; retrying once after 5s..."
            sleep 5
            build_for_testing | tee -a build-for-testing.log
          }

      - name: Run macOS tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project minimark.xcodeproj \
            -scheme minimark \
            -destination 'platform=macOS' \
            -only-testing:minimarkTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            -resultBundlePath TestResults.xcresult \
            | tee test.log

      - name: Upload test logs and result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-debug-artifacts
          path: |
            resolve-packages.log
            build-for-testing.log
            test.log
            BuildForTestingResults.xcresult
            TestResults.xcresult
          if-no-files-found: warn